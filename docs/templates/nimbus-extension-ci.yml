# Nimbus extension — GitHub Actions CI template
#
# Copy to `.github/workflows/ci.yml` in your extension repository and adjust:
# - Default branch name if not `main`
# - `working-directory` if the extension is not at the repo root
# - Bun version to match your extension
#
# The `nimbus` CLI must be on PATH for `nimbus test`. Options:
#   A) Install a release binary from your Nimbus distribution (Linux .deb / tarball, etc.)
#      and add its directory to PATH in a prior step.
#   B) Clone this monorepo in CI and `bun run build` the CLI, then `export PATH=$PWD/packages/cli/dist:$PATH`
#      (exact path depends on OS — use `nimbus.exe` on Windows runners).
#   C) Cache a prebuilt `nimbus` artifact you publish from your org.

name: Extension CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      # - name: Add nimbus CLI to PATH
      #   run: |
      #     curl -fsSL -o nimbus.tgz "<URL_TO_LINUX_AMD64_TARBALL>"
      #     tar -xzf nimbus.tgz
      #     echo "$PWD" >> "$GITHUB_PATH"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Nimbus extension contract + tests
        run: nimbus test .

      - name: Audit (high)
        run: bun audit --audit-level high
