# Nimbus extension — GitHub Actions CI template
#
# Copy to `.github/workflows/ci.yml` in your extension repo and adjust:
# - `working-directory` if the extension is not at the repo root
# - Bun / Node versions to match your extension
#
# Prerequisites: `nimbus` CLI on PATH (install from a Nimbus release or build from source).

name: Extension CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Nimbus extension contract + tests
        run: nimbus test .

      - name: Audit (high)
        run: bun audit --audit-level high
