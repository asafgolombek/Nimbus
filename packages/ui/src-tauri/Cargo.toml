[package]
name = "app"
version = "0.1.0"
description = "Nimbus desktop Tauri shell — thin bridge to the headless Bun Gateway over JSON-RPC 2.0 IPC."
authors = ["Nimbus contributors"]
license = "AGPL-3.0-or-later"
repository = "https://github.com/asafgolombek/Nimbus"
edition = "2021"
rust-version = "1.88.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.3", features = ["tray-icon", "image-png", "macos-private-api"] }
tauri-plugin-log = "2"
tauri-plugin-shell = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-clipboard-manager = "2"
tokio = { version = "1", features = ["rt-multi-thread", "io-util", "net", "sync", "time", "macros"] }
interprocess = { version = "2", features = ["tokio"] }
thiserror = "2"
