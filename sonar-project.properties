# Local / CI SonarScanner configuration for SonarCloud.
# Replace the two placeholders below with values from https://sonarcloud.io → your project → Information.
# See docs/sonar-local.md for SonarLint and scanner usage.

sonar.organization=asafgolombek
# Must match the SonarCloud project key (e.g. MCP search_sonar_issues_in_projects).
sonar.projectKey=asafgolombek_Nimbus

sonar.host.url=https://sonarcloud.io

sonar.sourceEncoding=UTF-8
sonar.sources=packages/gateway/src,packages/cli/src,packages/sdk/src,packages/ui/src,packages/mcp-connectors/google-drive/src,packages/mcp-connectors/onedrive/src,packages/mcp-connectors/outlook/src,packages/mcp-connectors/google-photos/src
sonar.tests=packages/gateway,packages/cli,packages/sdk
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/test/**/*.ts,**/test/**/*.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/src-tauri/**,**/*.d.ts,**/packages/cli/src/nimbus.js,**/packages/gateway/src/nimbus-gateway.js,**/packages/mcp-connectors/*/src/nimbus-mcp-*.js

# Coverage — `bun test --coverage-reporter=lcov` writes coverage/lcov.info for
# the gateway / cli / sdk / client / mcp-connectors packages; Vitest writes
# packages/ui/coverage/lcov.info for the UI sub-project. Both must be listed
# so Sonar attributes coverage to every file under sonar.sources.
sonar.javascript.lcov.reportPaths=coverage/lcov.info,packages/ui/coverage/lcov.info

# Point analysis at gateway tsconfig (primary strict TS root); adjust if SonarCloud project uses another layout.
sonar.typescript.tsconfigPath=packages/gateway/tsconfig.json
