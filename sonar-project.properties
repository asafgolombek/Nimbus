# Local / CI SonarScanner configuration for SonarCloud.
# Replace the two placeholders below with values from https://sonarcloud.io → your project → Information.
# See docs/sonar-local.md for SonarLint and scanner usage.

sonar.organization=asafgolombek
# Must match the SonarCloud project key (e.g. MCP search_sonar_issues_in_projects).
sonar.projectKey=asafgolombek_Nimbus

sonar.host.url=https://sonarcloud.io

sonar.sourceEncoding=UTF-8

# Source roots — `packages` covers every workspace package. `sonar.sources`
# and `sonar.tests` deliberately overlap; `sonar.test.inclusions` below
# routes test files into the tests bucket, and `sonar.exclusions` prunes
# non-source artefacts (Astro docs, dist/build, src-tauri, generated
# nimbus-*.js bundles).
sonar.sources=packages
sonar.tests=packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/test/**/*.ts,**/test/**/*.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.astro/**,**/src-tauri/**,**/*.d.ts,**/packages/cli/src/nimbus.js,**/packages/gateway/src/nimbus-gateway.js,**/packages/mcp-connectors/*/src/nimbus-mcp-*.js,**/packages/docs/**

# Coverage — `bun test --coverage-reporter=lcov` writes coverage/lcov.info for
# the gateway / cli / sdk / client / mcp-connectors packages; Vitest writes
# packages/ui/coverage/lcov.info for the UI sub-project. Both must be listed
# so Sonar attributes coverage to every file under sonar.sources.
sonar.javascript.lcov.reportPaths=coverage/lcov.info,packages/ui/coverage/lcov.info

# SQL migration templates are one-string-constant modules with no
# executable JS/TS lines — excluding from coverage prevents them from
# dragging the metric down. Synthetic perf-fixture trace generators run
# only inside bench drivers, which are gated behind `nimbus bench`, so
# coverage there is structurally near-zero in CI.
sonar.coverage.exclusions=**/index/*-v[0-9]*-sql.ts,**/perf/fixtures/synthetic-*-trace.ts

# Synthetic trace fixtures share an intentional shape (seeded LCG +
# tier-scaled page generator); SQL migration templates are inherently
# similar (CREATE TABLE skeletons). Excluding from copy-paste detection
# avoids the duplication-density metric flagging deliberate parallelism.
sonar.cpd.exclusions=**/perf/fixtures/synthetic-*-trace.ts,**/index/*-v[0-9]*-sql.ts

# Type-aware analysis — every package has its own tsconfig. Without
# enumerating them all, only the gateway tsconfig is honoured and
# cli / ui / sdk / client / mcp-connectors fall back to type-unaware
# rules. Globs are supported per SonarCloud docs.
sonar.typescript.tsconfigPaths=packages/*/tsconfig.json,packages/mcp-connectors/*/tsconfig.json
