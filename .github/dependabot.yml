# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    # Vite 8 + @vitejs/plugin-react 6 must land together; plugin-react@6 peers vite@^8.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
    groups:
      ui-testing:
        patterns:
          - "jsdom"
          - "vitest"
          - "@vitest/coverage-v8"
          - "@testing-library/*"
      tooling:
        patterns:
          - "@biomejs/biome"
          - "typescript"
      playwright:
        patterns:
          - "playwright"
          - "@playwright/*"
      tauri-js:
        patterns:
          - "@tauri-apps/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "cargo"
    directory: "/packages/ui/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "github/codeql-action"
          - "aquasecurity/trivy-action"
          - "dtolnay/rust-toolchain"
          - "oven-sh/setup-bun"
          - "softprops/action-gh-release"
          - "dorny/test-reporter"
          - "dorny/paths-filter"
          - "Swatinem/rust-cache"
