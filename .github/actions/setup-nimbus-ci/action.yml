name: Setup Nimbus CI (Bun)
description: Install Bun, restore ~/.bun/install/cache, optionally verify bun.lock, then frozen install.

inputs:
  bun-version:
    description: Bun version passed to oven-sh/setup-bun
    required: false
    default: "1.3"
  verify-lock:
    description: Run bun install and fail if bun.lock is out of date
    required: false
    default: "true"
  frozen-install:
    description: Run bun install --frozen-lockfile
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun package download cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install and verify dependencies
      shell: bash
      run: |
        if [ "${{ inputs.verify-lock }}" = "true" ]; then
          bun install
          git diff --exit-code -- bun.lock
        elif [ "${{ inputs.frozen-install }}" = "true" ]; then
          bun install --frozen-lockfile
        else
          bun install
        fi
