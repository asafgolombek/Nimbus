name: Setup Nimbus CI (Bun)
description: Install Bun, restore ~/.bun/install/cache, optionally verify bun.lock, then frozen install.

inputs:
  bun-version:
    description: Bun version passed to oven-sh/setup-bun
    required: false
    default: "1.3"
  verify-lock:
    description: Run bun install and fail if bun.lock is out of date
    required: false
    default: "true"
  frozen-install:
    description: Run bun install --frozen-lockfile
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@4623b13bb3a20f259f8171737606745d33613ac1 # v2.0.1
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun package download cache
      uses: actions/cache@d4323d4df104b026a6aa633f9c4b8fdf10c58829 # v4.2.0
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install and verify dependencies
      shell: bash
      env:
        VERIFY_LOCK: ${{ inputs.verify-lock }}
        FROZEN_INSTALL: ${{ inputs.frozen-install }}
      run: |
        if [ "$VERIFY_LOCK" = "true" ]; then
          bun install
          git diff --exit-code -- bun.lock
        elif [ "$FROZEN_INSTALL" = "true" ]; then
          bun install --frozen-lockfile
        else
          bun install
        fi
