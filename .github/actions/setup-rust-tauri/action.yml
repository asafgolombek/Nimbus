name: Setup Rust + Tauri checks
description: >
  Install Linux libs (Linux only), Rust stable toolchain, restore Cargo cache,
  then optionally run rustfmt and clippy for packages/ui/src-tauri.

inputs:
  run-checks:
    description: Run rustfmt and clippy (set to false to only install and cache)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Linux libs for Tauri
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
          librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
          libsecret-tools gnome-keyring

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@a54c88d781973033b767a778018129d66de974a9 # stable
      with:
        components: rustfmt, clippy

    - name: Rust cache (Tauri)
      uses: Swatinem/rust-cache@23bce300709d20229ad7fd30273d93ae57388003 # v2.7.7
      with:
        workspaces: packages/ui/src-tauri

    - name: Rustfmt (Tauri)
      if: inputs.run-checks == 'true'
      shell: bash
      working-directory: packages/ui/src-tauri
      run: cargo fmt --all -- --check

    - name: Clippy (Tauri)
      if: inputs.run-checks == 'true'
      shell: bash
      working-directory: packages/ui/src-tauri
      run: cargo clippy --all-targets --all-features -- -D warnings
