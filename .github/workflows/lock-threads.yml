name: 'Lock Threads'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: github/lock-threads@1bf7ec25051fe7c000e502b11ee2aef2b2715590 # v5.0.1
        with:
          issue-inactive-days: '30'
          pr-inactive-days: '30'
