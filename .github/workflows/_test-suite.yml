name: Test Suite

# Reusable workflow — called by ci.yml (pr-quality-ts and ci-ts).
# Runs all TS/Bun checks and tests for a single OS runner.
on:
  workflow_call:
    inputs:
      runner:
        description: GitHub-hosted runner label (e.g. ubuntu-22.04)
        type: string
        required: true
      run-packaging:
        description: Build headless bundle and Linux installers after tests (Ubuntu only)
        type: boolean
        default: false

permissions: {}

jobs:
  test:
    name: Test — ${{ inputs.runner }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      checks: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Linux — libsecret + D-Bus (vault / PAL tests)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsecret-tools gnome-keyring dbus

      - name: macOS — Strip quarantine from native SQLite extensions
        if: runner.os == 'macOS'
        shell: bash
        run: find node_modules -name "*.dylib" -print0 2>/dev/null | xargs -0 xattr -d com.apple.quarantine 2>/dev/null || true

      - name: macOS — Create and unlock CI Keychain (vault / PAL tests)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          security create-keychain -p "" nimbus-ci.keychain
          security list-keychains -d user -s nimbus-ci.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s nimbus-ci.keychain
          security unlock-keychain -p "" nimbus-ci.keychain
          security set-keychain-settings -lut 7200 nimbus-ci.keychain

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format (Biome)
        run: bun run lint

      - name: Build all packages
        run: bun run build

      # Bun writes JUnit XML here. Do not use `reports/` — it is gitignored and dorny/test-reporter's fast-glob skips ignored paths.
      - name: Prepare test report directory
        shell: bash
        run: mkdir -p junit-reports

      - name: Unit tests (with coverage) — Linux
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/ci/run-with-optional-dbus.sh bun test packages/gateway packages/cli packages/sdk packages/client packages/mcp-connectors --coverage --reporter=junit --reporter-outfile=junit-reports/junit-unit.xml
        env:
          CI: "true"

      - name: Unit tests (with coverage) — macOS/Windows (retry once)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          for attempt in 1 2; do
            bun test packages/gateway packages/cli packages/sdk packages/client packages/mcp-connectors --coverage --reporter=junit --reporter-outfile=junit-reports/junit-unit.xml && break
            echo "Attempt $attempt failed, retrying in 5 s..." && sleep 5
          done
        env:
          CI: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true

      - name: Integration tests
        run: bun test packages/gateway/test/integration/ packages/cli/test/integration/ --reporter=junit --reporter-outfile=junit-reports/junit-integration.xml
        env:
          CI: "true"

      - name: E2E Gateway tests
        run: bun test packages/gateway/test/e2e/ --reporter=junit --reporter-outfile=junit-reports/junit-e2e-gateway.xml
        env:
          CI: "true"

      - name: E2E CLI tests
        run: bun test packages/cli/test/e2e/ --reporter=junit --reporter-outfile=junit-reports/junit-e2e-cli.xml
        env:
          CI: "true"

      - name: UI component tests (Vitest)
        shell: bash
        run: cd packages/ui && bunx vitest run --coverage
        env:
          CI: "true"

      - name: Headless bundle + Linux installers
        if: inputs.run-packaging
        shell: bash
        run: |
          set -e
          mkdir -p dist
          (cd packages/gateway && bun build src/index.ts --compile --outfile ../../dist/nimbus-gateway --target bun)
          (cd packages/cli && bun build src/index.ts --compile --outfile ../../dist/nimbus --target bun)
          bun scripts/package-headless-bundle.ts --skip-embedding-model
          bun run package:installers:linux -- --version 0.0.0-ci
          test -f dist/installers/nimbus-headless_0.0.0-ci_amd64.deb
          test -f dist/installers/nimbus-headless-linux-amd64-v0.0.0-ci.tar.gz

      - name: JUnit test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0 (Node 24)
        if: always()
        with:
          name: Tests (${{ inputs.runner }})
          path: junit-reports/junit-*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Cleanup E2E test artifacts
        if: always()
        shell: bash
        run: |
          rm -rf /tmp/nimbus-test-* 2>/dev/null || true
          rm -rf "${TEMP:-/tmp}/nimbus-test-"* 2>/dev/null || true

  # Run coverage gates in parallel to reduce critical path.
  # These re-run specific tests to enforce thresholds.
  coverage-gates:
    name: Coverage — ${{ matrix.gate.name }} (${{ inputs.runner }})
    needs: test
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        gate:
          - name: Engine
            script: "test:coverage:engine"
          - name: Vault
            script: "test:coverage:vault"
          - name: Sync scheduler
            script: "test:coverage:sync"
          - name: Rate limiter
            script: "test:coverage:rate-limiter"
          - name: People
            script: "test:coverage:people"
          - name: Embedding
            script: "test:coverage:embedding"
          - name: Workflow
            script: "test:coverage:workflow"
          - name: Watcher
            script: "test:coverage:watcher"
          - name: Extensions
            script: "test:coverage:extensions"
          - name: Config
            script: "test:coverage:config"
          - name: Client
            script: "test:coverage:client"
          - name: Telemetry
            script: "test:coverage:telemetry"
          - name: DB layer
            script: "test:coverage:db"
          - name: MCP
            script: "test:coverage:mcp"
    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Linux — libsecret + D-Bus (vault tests)
        if: runner.os == 'Linux' && matrix.gate.name == 'Vault'
        shell: bash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsecret-tools gnome-keyring dbus

      - name: Run coverage gate
        shell: bash
        run: |
          if [[ "${{ matrix.gate.name }}" == "Vault" && "${{ runner.os }}" == "Linux" ]]; then
            bash scripts/ci/run-with-optional-dbus.sh bun run ${{ matrix.gate.script }}
          else
            bun run ${{ matrix.gate.script }}
          fi
        env:
          CI: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          flags: ${{ matrix.gate.name }}
