name: release-please

on:
  workflow_dispatch: # disabled auto-release; trigger manually when a phase is complete

permissions:
  contents: read
  pull-requests: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Needed when using the default GITHUB_TOKEN (no RELEASE_PLEASE_PAT). Optional PAT keeps
    # the same scopes off the automatic token if you add secret RELEASE_PLEASE_PAT later.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          release-type: node
          package-name: nimbus
          token: ${{ secrets.RELEASE_PLEASE_PAT || github.token }}
