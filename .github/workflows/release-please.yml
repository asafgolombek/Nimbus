name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328af45a28ef5834d603b173d # v2.18.0
        with:
          egress-policy: audit

      - uses: googleapis/release-please-action@a02a3451548fa571f091770a007d71da739c35ba # v4.1.3
        with:
          release-type: node
          package-name: nimbus
