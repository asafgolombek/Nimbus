name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-gateway:
    name: Build Gateway — ${{ matrix.target.os }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-22.04
            artifact: nimbus-gateway-linux-x64
            ext: ""
          # Intel/x64 image — matches nimbus-gateway-macos-x64 (macos-13 retired)
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-gateway-macos-x64
            ext: ""
          - os: windows
            runner: windows-2022
            artifact: nimbus-gateway-windows-x64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build Gateway binary
        run: |
          cd packages/gateway
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Sign binary (macOS)
        if: matrix.target.os == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          # TODO: Add codesign + notarytool steps when Apple Developer account is configured
          echo "macOS signing: configure MACOS_CERTIFICATE and related secrets in GitHub repo settings"

      - name: Sign binary (Windows)
        if: matrix.target.os == 'windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          # TODO: Add signtool.exe steps when Windows code signing cert is configured
          echo "Windows signing: configure WINDOWS_CERTIFICATE secret in GitHub repo settings"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error

  build-cli:
    name: Build CLI — ${{ matrix.target.os }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-22.04
            artifact: nimbus-cli-linux-x64
            ext: ""
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-cli-macos-x64
            ext: ""
          - os: windows
            runner: windows-2022
            artifact: nimbus-cli-windows-x64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: |
          cd packages/cli
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-gateway
      - build-cli
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
