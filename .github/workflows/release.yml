name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Single typecheck pass — no need to repeat across all build platforms
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Typecheck
        run: bun run typecheck

  # Full test suite on the tagged commit — prevents publishing broken binaries.
  # Runs on ubuntu only (the full 3-OS matrix already runs on every push to main).
  test:
    name: Test suite (release gate)
    needs: validate
    uses: ./.github/workflows/_test-suite.yml
    with:
      runner: ubuntu-24.04
      run-packaging: false
    permissions:
      contents: read
      id-token: write

  build-gateway:
    name: Build Gateway — ${{ matrix.target.os }}
    needs: [validate, test]
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-24.04
            artifact: nimbus-gateway-linux-x64
            ext: ""
          # Intel/x64 image — matches nimbus-gateway-macos-x64 (macos-13 retired)
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-gateway-macos-x64
            ext: ""
          # Apple Silicon — native arm64 binary (no Rosetta)
          - os: macos-arm64
            runner: macos-15
            artifact: nimbus-gateway-macos-arm64
            ext: ""
          - os: windows
            runner: windows-2025
            artifact: nimbus-gateway-windows-x64
            ext: ".exe"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Build Gateway binary
        run: |
          cd packages/gateway
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Sign binary (Linux GPG)
        if: matrix.target.os == 'linux'
        timeout-minutes: 15
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash scripts/sign-linux-gpg.sh dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

      - name: Sign binary (Ed25519 updater)
        timeout-minutes: 5
        env:
          UPDATER_SIGNING_KEY: ${{ secrets.UPDATER_SIGNING_KEY }}
        run: bun scripts/sign-ed25519.ts dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

  build-cli:
    name: Build CLI — ${{ matrix.target.os }}
    needs: [validate, test]
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-24.04
            artifact: nimbus-cli-linux-x64
            ext: ""
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-cli-macos-x64
            ext: ""
          # Apple Silicon — native arm64 binary (no Rosetta)
          - os: macos-arm64
            runner: macos-15
            artifact: nimbus-cli-macos-arm64
            ext: ""
          - os: windows
            runner: windows-2025
            artifact: nimbus-cli-windows-x64
            ext: ".exe"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Build CLI binary
        run: |
          cd packages/cli
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-gateway
      - build-cli
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: release
    # Keep GITHUB_TOKEN read-only here; GitHub Release API uses RELEASE_PAT (fine-grained: Contents RW).
    # id-token: write is required by anchore/sbom-action to attach an OIDC-signed attestation.
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Require release PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "${RELEASE_PAT}" ]; then
            echo "Missing repository secret RELEASE_PAT (fine-grained PAT: Contents read/write for this repo)." >&2
            exit 1
          fi

      - name: Setup Bun and install dependencies (packaging)
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/

      - name: Linux installers (.deb + tarball + AppImage)
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y libfuse2 file
          # Pin appimagetool; update hash when bumping the version.
          APPIMAGETOOL_VERSION="continuous"
          APPIMAGETOOL_URL="https://github.com/AppImage/AppImageKit/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage"
          curl -fsSL "$APPIMAGETOOL_URL" -o /tmp/appimagetool
          chmod +x /tmp/appimagetool
          # Materialize inputs into the bundle layout expected by package-linux-installers.ts.
          mkdir -p dist/headless-bundle
          cp dist/nimbus-gateway-linux-x64/nimbus-gateway-linux-x64 dist/headless-bundle/nimbus-gateway
          cp dist/nimbus-cli-linux-x64/nimbus-cli-linux-x64 dist/headless-bundle/nimbus
          chmod +x dist/headless-bundle/nimbus-gateway dist/headless-bundle/nimbus
          V="${GITHUB_REF_NAME#v}"
          bun scripts/package-linux-installers.ts \
            --bundle dist/headless-bundle \
            --version "$V" \
            --appimagetool /tmp/appimagetool

      - name: Sign Linux installer artifacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -e
          for f in dist/installers/*.deb dist/installers/*.AppImage dist/installers/*.tar.gz; do
            [ -f "$f" ] || continue
            bash scripts/sign-linux-gpg.sh "$f"
          done

      - name: Build macOS + Windows archives
        shell: bash
        run: |
          set -e
          mkdir -p dist/archives
          V="${GITHUB_REF_NAME#v}"

          # macOS x64 tarball
          mkdir -p dist/stage-macos-x64
          cp dist/nimbus-gateway-macos-x64/nimbus-gateway-macos-x64 dist/stage-macos-x64/
          cp dist/nimbus-cli-macos-x64/nimbus-cli-macos-x64         dist/stage-macos-x64/
          cp scripts/release/archive-contents/README-QUICKSTART.txt dist/stage-macos-x64/
          cp scripts/release/archive-contents/LICENSE-AGPL.txt      dist/stage-macos-x64/
          chmod +x dist/stage-macos-x64/nimbus-*
          tar -czf dist/archives/nimbus-headless-macos-x64.tar.gz -C dist/stage-macos-x64 .

          # macOS arm64 tarball
          mkdir -p dist/stage-macos-arm64
          cp dist/nimbus-gateway-macos-arm64/nimbus-gateway-macos-arm64 dist/stage-macos-arm64/
          cp dist/nimbus-cli-macos-arm64/nimbus-cli-macos-arm64         dist/stage-macos-arm64/
          cp scripts/release/archive-contents/README-QUICKSTART.txt     dist/stage-macos-arm64/
          cp scripts/release/archive-contents/LICENSE-AGPL.txt          dist/stage-macos-arm64/
          chmod +x dist/stage-macos-arm64/nimbus-*
          tar -czf dist/archives/nimbus-headless-macos-arm64.tar.gz -C dist/stage-macos-arm64 .

          # Windows x64 zip
          mkdir -p dist/stage-windows-x64
          cp dist/nimbus-gateway-windows-x64/nimbus-gateway-windows-x64.exe dist/stage-windows-x64/
          cp dist/nimbus-cli-windows-x64/nimbus-cli-windows-x64.exe         dist/stage-windows-x64/
          cp scripts/release/archive-contents/README-QUICKSTART.txt         dist/stage-windows-x64/
          cp scripts/release/archive-contents/LICENSE-AGPL.txt              dist/stage-windows-x64/
          (cd dist/stage-windows-x64 && zip -r ../archives/nimbus-headless-windows-x64.zip .)

          # Cleanup
          rm -rf dist/stage-macos-x64 dist/stage-macos-arm64 dist/stage-windows-x64

      - name: Verify SIGNING-KEY placeholder is not in release assets
        shell: bash
        run: |
          set -e
          if grep -lR "PLACEHOLDER-DO-NOT-USE" docs/release/SIGNING-KEY.asc 2>/dev/null; then
            echo "::error::docs/release/SIGNING-KEY.asc still contains the PLACEHOLDER sentinel."
            echo "::error::Overwrite with the real production public-key body before tagging."
            exit 1
          fi

      # Generate a CycloneDX SBOM of the source tree. Captures Bun + Cargo
      # dependency graphs that produced the binaries downloaded above. Output is
      # attached to the release for downstream consumers and signed via OIDC by
      # the anchore action's call to attest-build-provenance.
      - name: Generate SBOM (CycloneDX)
        id: sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: nimbus-${{ github.ref_name }}-sbom.cdx.json
          # Don't auto-attach to GitHub Release (we do it explicitly below to control filename).
          upload-release-assets: false
          upload-artifact: true

      - name: Stage release assets
        shell: bash
        run: |
          set -e
          mkdir -p dist/stage

          # actions/upload-artifact puts files under dist/<artifact-name>/<filename>.
          # The inner <filename> is ALREADY the final release name per the build
          # step (bun build --outfile <artifact-name>), so copying preserves the
          # end-user-facing filename exactly. That's what SHA256SUMS must list.

          # Raw binaries (every OS)
          cp dist/nimbus-gateway-linux-x64/nimbus-gateway-linux-x64*           dist/stage/
          cp dist/nimbus-cli-linux-x64/nimbus-cli-linux-x64*                   dist/stage/
          cp dist/nimbus-gateway-macos-x64/nimbus-gateway-macos-x64            dist/stage/
          cp dist/nimbus-cli-macos-x64/nimbus-cli-macos-x64                    dist/stage/
          cp dist/nimbus-gateway-macos-arm64/nimbus-gateway-macos-arm64        dist/stage/
          cp dist/nimbus-cli-macos-arm64/nimbus-cli-macos-arm64                dist/stage/
          cp dist/nimbus-gateway-windows-x64/nimbus-gateway-windows-x64.exe    dist/stage/
          cp dist/nimbus-cli-windows-x64/nimbus-cli-windows-x64.exe            dist/stage/

          # Linux installers + .asc sidecars
          cp dist/installers/*                                                  dist/stage/

          # Archives
          cp dist/archives/*                                                    dist/stage/

          # SBOM
          cp "${{ steps.sbom.outputs.fileName }}"                              "dist/stage/nimbus-${GITHUB_REF_NAME}-sbom.cdx.json"

          # Verify scripts (uploaded as release assets so users can curl them)
          cp scripts/release/nimbus-verify.sh                                   dist/stage/
          cp scripts/release/nimbus-verify.ps1                                  dist/stage/

          ls -la dist/stage/

      - name: Compute SHA256SUMS
        shell: bash
        run: |
          set -e
          cd dist/stage
          # LC_ALL=C guarantees byte-identical output across runner images + locales.
          LC_ALL=C sha256sum * | LC_ALL=C sort -k2 > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
          echo "=================="

      - name: Sign SHA256SUMS
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -e
          bash scripts/sign-linux-gpg.sh dist/stage/SHA256SUMS
          ls -la dist/stage/SHA256SUMS*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a21967200391e1b9067ad0ba5 # v2.6.2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          files: dist/stage/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-manifest:
    name: Publish updater manifest
    needs: publish-release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist/
      - name: Flatten artifact dir
        run: |
          mkdir -p manifest-build
          cp dist/nimbus-gateway-linux-x64/nimbus-gateway-linux-x64* manifest-build/
          cp dist/nimbus-gateway-macos-x64/nimbus-gateway-macos-x64* manifest-build/
          cp dist/nimbus-gateway-macos-arm64/nimbus-gateway-macos-arm64* manifest-build/
          cp dist/nimbus-gateway-windows-x64/nimbus-gateway-windows-x64.exe* manifest-build/
      - name: Build latest.json
        working-directory: manifest-build
        run: |
          V="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
          bun ../scripts/build-update-manifest.ts --version "$V" --output latest.json --base-url "$BASE"
      - name: Upload latest.json to release
        uses: softprops/action-gh-release@c95fe1489396fe8a21967200391e1b9067ad0ba5
        with:
          token: ${{ secrets.RELEASE_PAT }}
          files: manifest-build/latest.json
