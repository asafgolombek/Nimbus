name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  # Single typecheck pass — no need to repeat across all build platforms
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Typecheck
        run: bun run typecheck

  build-gateway:
    name: Build Gateway — ${{ matrix.target.os }}
    needs: validate
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-22.04
            artifact: nimbus-gateway-linux-x64
            ext: ""
          # Intel/x64 image — matches nimbus-gateway-macos-x64 (macos-13 retired)
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-gateway-macos-x64
            ext: ""
          - os: windows
            runner: windows-2022
            artifact: nimbus-gateway-windows-x64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Build Gateway binary
        run: |
          cd packages/gateway
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      # When implementing signing, prefer a `release` GitHub Environment for secrets + optional reviewers.
      - name: Sign binary (macOS)
        if: matrix.target.os == 'macos'
        timeout-minutes: 15
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          # TODO: Add codesign + notarytool steps when Apple Developer account is configured
          echo "macOS signing: configure MACOS_CERTIFICATE and related secrets in GitHub repo settings"

      - name: Sign binary (Windows)
        if: matrix.target.os == 'windows'
        timeout-minutes: 15
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          # TODO: Add signtool.exe steps when Windows code signing cert is configured
          echo "Windows signing: configure WINDOWS_CERTIFICATE secret in GitHub repo settings"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

  build-cli:
    name: Build CLI — ${{ matrix.target.os }}
    needs: validate
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-22.04
            artifact: nimbus-cli-linux-x64
            ext: ""
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-cli-macos-x64
            ext: ""
          - os: windows
            runner: windows-2022
            artifact: nimbus-cli-windows-x64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Build CLI binary
        run: |
          cd packages/cli
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-gateway
      - build-cli
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun and install dependencies (packaging)
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/

      - name: Linux .deb + tarball from CI binaries (§7.9)
        shell: bash
        run: |
          set -e
          mkdir -p dist/headless-bundle
          cp dist/nimbus-gateway-linux-x64/nimbus-gateway-linux-x64 dist/headless-bundle/nimbus-gateway
          cp dist/nimbus-cli-linux-x64/nimbus-cli-linux-x64 dist/headless-bundle/nimbus
          chmod +x dist/headless-bundle/nimbus-gateway dist/headless-bundle/nimbus
          V="${GITHUB_REF_NAME#v}"
          bun scripts/package-linux-installers.ts --bundle dist/headless-bundle --version "$V"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/nimbus-gateway-*/nimbus-gateway-*
            dist/nimbus-cli-*/nimbus-cli-*
            dist/installers/nimbus-headless*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
