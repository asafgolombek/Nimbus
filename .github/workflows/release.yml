name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Single typecheck pass — no need to repeat across all build platforms
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Typecheck
        run: bun run typecheck

  # Full test suite on the tagged commit — prevents publishing broken binaries.
  # Runs on ubuntu only (the full 3-OS matrix already runs on every push to main).
  test:
    name: Test suite (release gate)
    needs: validate
    uses: ./.github/workflows/_test-suite.yml
    with:
      runner: ubuntu-22.04
      run-packaging: false
    permissions:
      contents: read
      id-token: write

  build-gateway:
    name: Build Gateway — ${{ matrix.target.os }}
    needs: [validate, test]
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-22.04
            artifact: nimbus-gateway-linux-x64
            ext: ""
          # Intel/x64 image — matches nimbus-gateway-macos-x64 (macos-13 retired)
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-gateway-macos-x64
            ext: ""
          # Apple Silicon — native arm64 binary (no Rosetta)
          - os: macos-arm64
            runner: macos-14
            artifact: nimbus-gateway-macos-arm64
            ext: ""
          - os: windows
            runner: windows-2022
            artifact: nimbus-gateway-windows-x64
            ext: ".exe"

    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Build Gateway binary
        run: |
          cd packages/gateway
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Sign binary (macOS)
        if: startsWith(matrix.target.os, 'macos')
        timeout-minutes: 15
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: bash scripts/sign-macos.sh dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

      - name: Sign binary (Windows)
        if: matrix.target.os == 'windows'
        timeout-minutes: 15
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        shell: pwsh
        run: ./scripts/sign-windows.ps1 -Target dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

      - name: Sign binary (Linux GPG)
        if: matrix.target.os == 'linux'
        timeout-minutes: 15
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash scripts/sign-linux-gpg.sh dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

      - name: Sign binary (Ed25519 updater)
        timeout-minutes: 5
        env:
          UPDATER_SIGNING_KEY: ${{ secrets.UPDATER_SIGNING_KEY }}
        run: bun scripts/sign-ed25519.ts dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

  build-cli:
    name: Build CLI — ${{ matrix.target.os }}
    needs: [validate, test]
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            runner: ubuntu-22.04
            artifact: nimbus-cli-linux-x64
            ext: ""
          - os: macos
            runner: macos-15-intel
            artifact: nimbus-cli-macos-x64
            ext: ""
          # Apple Silicon — native arm64 binary (no Rosetta)
          - os: macos-arm64
            runner: macos-14
            artifact: nimbus-cli-macos-arm64
            ext: ""
          - os: windows
            runner: windows-2022
            artifact: nimbus-cli-windows-x64
            ext: ".exe"

    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Build CLI binary
        run: |
          cd packages/cli
          bun build src/index.ts --compile --outfile ../../dist/${{ matrix.target.artifact }}${{ matrix.target.ext }} --target bun

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target.artifact }}
          path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ matrix.target.artifact }}${{ matrix.target.ext }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-gateway
      - build-cli
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    # Keep GITHUB_TOKEN read-only here; GitHub Release API uses RELEASE_PAT (fine-grained: Contents RW).
    permissions:
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Require release PAT
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "${RELEASE_PAT}" ]; then
            echo "Missing repository secret RELEASE_PAT (fine-grained PAT: Contents read/write for this repo)." >&2
            exit 1
          fi

      - name: Setup Bun and install dependencies (packaging)
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/

      - name: Linux .deb + tarball from CI binaries (§7.9)
        shell: bash
        run: |
          set -e
          mkdir -p dist/headless-bundle
          cp dist/nimbus-gateway-linux-x64/nimbus-gateway-linux-x64 dist/headless-bundle/nimbus-gateway
          cp dist/nimbus-cli-linux-x64/nimbus-cli-linux-x64 dist/headless-bundle/nimbus
          chmod +x dist/headless-bundle/nimbus-gateway dist/headless-bundle/nimbus
          V="${GITHUB_REF_NAME#v}"
          bun scripts/package-linux-installers.ts --bundle dist/headless-bundle --version "$V"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a21967200391e1b9067ad0ba5 # v2.6.2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          files: |
            dist/nimbus-gateway-*/nimbus-gateway-*
            dist/nimbus-cli-*/nimbus-cli-*
            dist/installers/nimbus-headless*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-manifest:
    name: Publish updater manifest
    needs: publish-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist/
      - name: Flatten artifact dir
        run: |
          mkdir -p manifest-build
          cp dist/nimbus-gateway-linux-x64/nimbus-gateway-linux-x64* manifest-build/
          cp dist/nimbus-gateway-macos-x64/nimbus-gateway-macos-x64* manifest-build/
          cp dist/nimbus-gateway-macos-arm64/nimbus-gateway-macos-arm64* manifest-build/
          cp dist/nimbus-gateway-windows-x64/nimbus-gateway-windows-x64.exe* manifest-build/
      - name: Build latest.json
        working-directory: manifest-build
        run: |
          V="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
          bun ../scripts/build-update-manifest.ts --version "$V" --output latest.json --base-url "$BASE"
      - name: Upload latest.json to release
        uses: softprops/action-gh-release@c95fe1489396fe8a21967200391e1b9067ad0ba5
        with:
          token: ${{ secrets.RELEASE_PAT }}
          files: manifest-build/latest.json
