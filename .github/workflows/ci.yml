name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Filter: detect changes to optimize PR feedback ──────────────────────────
  filter:
    name: Detect changes
    runs-on: ubuntu-22.04
    outputs:
      ui: ${{ steps.changes.outputs.ui }}
      rust: ${{ steps.changes.outputs.rust }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.3
        id: changes
        with:
          filters: |
            ui:
              - 'packages/ui/**'
              - 'packages/sdk/**'
            rust:
              - 'packages/ui/src-tauri/**'

  # ── PR: fast feedback (three jobs run in parallel) ─────────────────────────

  # TS/Bun test suite — ubuntu only, runs in parallel with pr-quality-rust
  pr-quality-ts:
    name: PR quality — TS/Bun (ubuntu-22.04)
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_test-suite.yml
    with:
      runner: ubuntu-22.04
      run-packaging: true
    permissions:
      contents: read
      checks: write
      # Required by _test-suite.yml (Codecov use_oidc: true on coverage-gates).
      id-token: write

  # Rust/Tauri checks — ubuntu only, runs in parallel with pr-quality-ts
  pr-quality-rust:
    name: PR quality — Rust/Tauri (ubuntu-22.04)
    if: github.event_name == 'pull_request' && needs.filter.outputs.rust == 'true'
    needs: filter
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust + Tauri checks
        uses: ./.github/actions/setup-rust-tauri

  # Code duplication scan — runs in parallel with the above two jobs
  pr-quality-duplication:
    name: PR quality — Duplication scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Detect code duplication (jscpd)
        # Exclude dependencies and tests to avoid false positives.
        run: bunx jscpd --min-lines 10 --min-tokens 50 --threshold 5 --reporters console -i "**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.vitest.tsx" packages/

  # ── Push: full cross-platform matrix (two parallel matrix jobs) ────────────

  # TS/Bun suite — all 3 OSes, runs in parallel with ci-rust
  # strategy must be declared before `uses` so `matrix.*` is valid for this job (GitHub Actions schema).
  ci-ts:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    name: CI — TS/Bun (${{ matrix.os }})
    uses: ./.github/workflows/_test-suite.yml
    with:
      runner: ${{ matrix.os }}
      run-packaging: ${{ matrix.os == 'ubuntu-22.04' }}
    permissions:
      contents: read
      checks: write
      id-token: write

  # Rust/Tauri checks — all 3 OSes, runs in parallel with ci-ts
  ci-rust:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    name: CI — Rust/Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust + Tauri checks
        uses: ./.github/actions/setup-rust-tauri

  # ── E2E Desktop ─────────────────────────────────────────────────────────────

  # E2E Desktop (PR) — optional: add label ci:e2e-desktop to the PR
  e2e-desktop-pr:
    name: E2E Desktop (PR) — ubuntu-22.04
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:e2e-desktop') && needs.filter.outputs.ui == 'true'
    needs: [filter, pr-quality-ts, pr-quality-rust]
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: read
      checks: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Setup Rust + Tauri (install only, no checks)
        uses: ./.github/actions/setup-rust-tauri
        with:
          run-checks: "false"

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Build Tauri app
        run: cd packages/ui && bunx tauri build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E desktop tests
        shell: bash
        run: |
          mkdir -p junit-reports
          bun test packages/ui/test/e2e/ --reporter=junit --reporter-outfile=junit-reports/junit-e2e-desktop.xml
        env:
          CI: "true"

      - name: JUnit test report (E2E desktop)
        uses: dorny/test-reporter@224082f6b60713ef3f739316906639514065d80a # v1.9.1
        if: always()
        with:
          name: E2E desktop (PR)
          path: junit-reports/junit-*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

  # E2E Desktop (Playwright + Tauri WebDriver) — push to main only, full OS matrix
  e2e-desktop:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci-ts, ci-rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    name: E2E Desktop — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: read
      checks: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Setup Rust + Tauri (install only, no checks)
        uses: ./.github/actions/setup-rust-tauri
        with:
          run-checks: "false"

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Build Tauri app
        run: cd packages/ui && bunx tauri build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E desktop tests
        shell: bash
        run: |
          mkdir -p junit-reports
          bun test packages/ui/test/e2e/ --reporter=junit --reporter-outfile=junit-reports/junit-e2e-desktop.xml
        env:
          CI: "true"

      - name: JUnit test report (E2E desktop)
        uses: dorny/test-reporter@224082f6b60713ef3f739316906639514065d80a # v1.9.1
        if: always()
        with:
          name: E2E desktop (${{ matrix.os }})
          path: junit-reports/junit-*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
