name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast PR feedback — single OS (see plan: Option B)
  pr-quality:
    name: PR quality — ubuntu-22.04
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Verify bun.lock is up to date
        shell: bash
        run: |
          set -e
          bun install
          git diff --exit-code -- bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format (Biome)
        run: bun run lint

      - name: Build all packages
        run: bun run build

      # Tauri Linux deps — required so cargo clippy can link gdk-sys / webkit
      - name: Install Linux libs for Tauri (Rust)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libsecret-tools gnome-keyring

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt (Tauri)
        working-directory: packages/ui/src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy (Tauri)
        working-directory: packages/ui/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests (with coverage)
        shell: bash
        run: bash scripts/ci/run-with-optional-dbus.sh bun test packages/gateway packages/cli packages/sdk --coverage
        env:
          CI: "true"

      - name: Coverage gate — Engine (≥85%)
        run: bun test packages/gateway/src/engine --coverage --coverage-threshold-lines=85
        env:
          CI: "true"

      - name: Coverage gate — Vault (≥90%)
        shell: bash
        run: bash scripts/ci/run-with-optional-dbus.sh bun test packages/gateway/src/vault --coverage --coverage-threshold-lines=90
        env:
          CI: "true"

      - name: Coverage gate — Sync scheduler (≥80%)
        run: bun test packages/gateway/src/sync/scheduler.test.ts --coverage --coverage-threshold-lines=80
        env:
          CI: "true"

      - name: Coverage gate — Rate limiter (≥85%)
        run: bun test packages/gateway/src/sync/rate-limiter.test.ts --coverage --coverage-threshold-lines=85
        env:
          CI: "true"

      - name: Coverage gate — People / linker (≥80%)
        run: bun test packages/gateway/src/people --coverage --coverage-threshold-lines=80
        env:
          CI: "true"

      - name: Integration tests
        run: bun test packages/gateway/test/integration/ packages/cli/test/integration/
        env:
          CI: "true"

      - name: E2E Gateway tests
        run: bun test packages/gateway/test/e2e/
        env:
          CI: "true"

      - name: E2E CLI tests
        run: bun test packages/cli/test/e2e/
        env:
          CI: "true"

      - name: UI component tests (Vitest)
        run: cd packages/ui && bunx vitest run --coverage
        env:
          CI: "true"

      - name: Headless bundle layout (smoke)
        shell: bash
        run: |
          set -e
          mkdir -p dist
          (cd packages/gateway && bun build src/index.ts --compile --outfile ../../dist/nimbus-gateway --target bun)
          (cd packages/cli && bun build src/index.ts --compile --outfile ../../dist/nimbus --target bun)
          bun run package:headless
          test -f dist/headless-bundle/nimbus-gateway
          test -f dist/headless-bundle/nimbus

      - name: Linux installers — .deb + tarball (§7.9)
        shell: bash
        run: |
          set -e
          bun run package:installers:linux -- --version 0.0.0-ci
          test -f dist/installers/nimbus-headless_0.0.0-ci_amd64.deb
          test -f dist/installers/nimbus-headless-linux-amd64-v0.0.0-ci.tar.gz

  # Full cross-platform matrix — pushes only
  ci:
    name: CI — ${{ matrix.os }}
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # macos-13 retired Dec 2025 — macOS 14 (Apple Silicon) for CI parity
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Verify bun.lock is up to date
        shell: bash
        run: |
          set -e
          bun install
          git diff --exit-code -- bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format (Biome)
        run: bun run lint

      - name: Build all packages
        run: bun run build

      - name: Install Linux libs for Tauri (Rust)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libsecret-tools gnome-keyring

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt (Tauri)
        working-directory: packages/ui/src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy (Tauri)
        working-directory: packages/ui/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests (with coverage)
        shell: bash
        run: bash scripts/ci/run-with-optional-dbus.sh bun test packages/gateway packages/cli packages/sdk --coverage
        env:
          CI: "true"

      - name: Coverage gate — Engine (≥85%)
        run: bun test packages/gateway/src/engine --coverage --coverage-threshold-lines=85
        env:
          CI: "true"

      - name: Coverage gate — Vault (≥90%)
        shell: bash
        run: bash scripts/ci/run-with-optional-dbus.sh bun test packages/gateway/src/vault --coverage --coverage-threshold-lines=90
        env:
          CI: "true"

      - name: Coverage gate — Sync scheduler (≥80%)
        run: bun test packages/gateway/src/sync/scheduler.test.ts --coverage --coverage-threshold-lines=80
        env:
          CI: "true"

      - name: Coverage gate — Rate limiter (≥85%)
        run: bun test packages/gateway/src/sync/rate-limiter.test.ts --coverage --coverage-threshold-lines=85
        env:
          CI: "true"

      - name: Coverage gate — People / linker (≥80%)
        run: bun test packages/gateway/src/people --coverage --coverage-threshold-lines=80
        env:
          CI: "true"

      - name: Integration tests
        run: bun test packages/gateway/test/integration/ packages/cli/test/integration/
        env:
          CI: "true"

      - name: E2E Gateway tests
        run: bun test packages/gateway/test/e2e/
        env:
          CI: "true"

      - name: E2E CLI tests
        run: bun test packages/cli/test/e2e/
        env:
          CI: "true"

      - name: UI component tests (Vitest)
        run: cd packages/ui && bunx vitest run --coverage
        env:
          CI: "true"

      - name: Headless bundle + Linux installers (Ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -e
          mkdir -p dist
          (cd packages/gateway && bun build src/index.ts --compile --outfile ../../dist/nimbus-gateway --target bun)
          (cd packages/cli && bun build src/index.ts --compile --outfile ../../dist/nimbus --target bun)
          bun run package:headless
          bun run package:installers:linux -- --version 0.0.0-ci
          test -f dist/installers/nimbus-headless_0.0.0-ci_amd64.deb
          test -f dist/installers/nimbus-headless-linux-amd64-v0.0.0-ci.tar.gz

  # E2E Desktop (PR) — Ubuntu only; catches Tauri/Playwright regressions before merge
  e2e-desktop-pr:
    name: E2E Desktop (PR) — ubuntu-22.04
    if: github.event_name == 'pull_request'
    needs: pr-quality
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Verify bun.lock is up to date
        shell: bash
        run: |
          set -e
          bun install
          git diff --exit-code -- bun.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: cd packages/ui && bunx tauri build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E desktop tests
        run: bun test packages/ui/test/e2e/
        env:
          CI: "true"

  # E2E Desktop (Playwright + Tauri WebDriver) — push to main only, full OS matrix
  e2e-desktop:
    name: E2E Desktop — ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Verify bun.lock is up to date
        shell: bash
        run: |
          set -e
          bun install
          git diff --exit-code -- bun.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: cd packages/ui && bunx tauri build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E desktop tests
        run: bun test packages/ui/test/e2e/
        env:
          CI: "true"
