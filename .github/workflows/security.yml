name: Security

on:
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328af45a28ef5834d603b173d # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: bun audit
        run: bun audit --audit-level high

  trivy-scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328af45a28ef5834d603b173d # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      # setup-trivy's install.sh resolves tags via unauthenticated github.com/.../releases/<tag> JSON, which often
      # fails under rate limits or GitHub instability (misreported as "unable to find 'v0.69.3'"). Use the REST API
      # with GITHUB_TOKEN instead. See https://github.com/aquasecurity/trivy/discussions/10152
      - name: Install Trivy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TRIVY_TAG: v0.69.3
        run: |
          set -euo pipefail
          DEST="${HOME}/.local/bin/trivy-bin"
          mkdir -p "${DEST}"
          release_json=$(curl -fsSL --retry 5 --retry-delay 8 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/aquasecurity/trivy/releases/tags/${TRIVY_TAG}")
          ver="${TRIVY_TAG#v}"
          asset_name="trivy_${ver}_Linux-64bit.tar.gz"
          asset_url=$(echo "${release_json}" | jq -r --arg n "${asset_name}" '.assets[] | select(.name == $n) | .browser_download_url')
          if [ -z "${asset_url}" ] || [ "${asset_url}" = "null" ]; then
            echo "Missing asset ${asset_name} in ${TRIVY_TAG}" >&2
            exit 1
          fi
          curl -fsSL --retry 5 --retry-delay 8 --retry-all-errors -o /tmp/trivy.tgz "${asset_url}"
          tar -xzf /tmp/trivy.tgz -C /tmp
          install -m 0755 /tmp/trivy "${DEST}/trivy"
          rm -f /tmp/trivy.tgz /tmp/trivy
          echo "${DEST}" >> "${GITHUB_PATH}"

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          # v0.35.0 still pins actions/cache@v4 (Node 20); disable until trivy-action upgrades to cache v5.
          cache: false

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

  gateway-security-contracts:
    name: Gateway audit JSON + connector.remove vault restore
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328af45a28ef5834d603b173d # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Audit payload safety + OAuth restore integration
        run: |
          bun test packages/gateway/src/engine/audit-payload-safety.test.ts \
            packages/gateway/test/integration/connector-remove-oauth-restore.integration.test.ts
        env:
          CI: "true"

  cargo-audit:
    name: Cargo audit (Tauri)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328af45a28ef5834d603b173d # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@d4323d4df104b026a6aa633f9c4b8fdf10c58829 # v4.2.0
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.1

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run cargo audit (packages/ui/src-tauri)
        working-directory: packages/ui/src-tauri
        run: cargo audit
