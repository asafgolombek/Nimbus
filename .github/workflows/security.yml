name: Security

on:
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: bun audit
        run: bun audit --audit-level high

  trivy-scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Trivy's Bun detector expects node_modules (see INFO in scan logs); matches the audit job and improves
      # lockfile / dependency graph accuracy. node_modules remains excluded from traversal via skip-dirs.
      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      # setup-trivy's install.sh resolves tags via unauthenticated github.com/.../releases/<tag> JSON, which often
      # fails under rate limits or GitHub instability (misreported as "unable to find 'v0.69.3'"). Use the REST API
      # with GITHUB_TOKEN instead. See https://github.com/aquasecurity/trivy/discussions/10152
      - name: Install Trivy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TRIVY_TAG: v0.69.3
        run: |
          set -euo pipefail
          DEST="${HOME}/.local/bin/trivy-bin"
          mkdir -p "${DEST}"
          release_json=$(curl -fsSL --retry 5 --retry-delay 8 --retry-all-errors \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/aquasecurity/trivy/releases/tags/${TRIVY_TAG}")
          ver="${TRIVY_TAG#v}"
          asset_name="trivy_${ver}_Linux-64bit.tar.gz"
          asset_url=$(echo "${release_json}" | jq -r --arg n "${asset_name}" '.assets[] | select(.name == $n) | .browser_download_url')
          if [ -z "${asset_url}" ] || [ "${asset_url}" = "null" ]; then
            echo "Missing asset ${asset_name} in ${TRIVY_TAG}" >&2
            exit 1
          fi
          curl -fsSL --retry 5 --retry-delay 8 --retry-all-errors -o /tmp/trivy.tgz "${asset_url}"
          tar -xzf /tmp/trivy.tgz -C /tmp
          install -m 0755 /tmp/trivy "${DEST}/trivy"
          rm -f /tmp/trivy.tgz /tmp/trivy
          echo "${DEST}" >> "${GITHUB_PATH}"

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          skip-dirs: "node_modules"
          # Keep SARIF + exit-code aligned with severity filter (avoids failing on lower severities in SARIF build).
          limit-severities-for-sarif: true
          # Keep disabled: trivy-action uses its own cache wiring; avoids duplicate cache restore/save noise.
          cache: false

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

  gateway-security-contracts:
    name: Gateway audit JSON + connector.remove vault restore
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci
        with:
          verify-lock: "false"

      - name: Audit payload safety + OAuth restore integration
        run: |
          bun test packages/gateway/src/engine/audit-payload-safety.test.ts \
            packages/gateway/test/integration/connector-remove-oauth-restore.integration.test.ts
        env:
          CI: "true"

  cargo-audit:
    name: Cargo audit (Tauri)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.1

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run cargo audit (packages/ui/src-tauri)
        working-directory: packages/ui/src-tauri
        run: cargo audit

  cargo-deny:
    name: Cargo deny (licenses + advisories + bans)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run cargo deny
        # Action pinned to a SHA. Walks deny.toml in the working dir.
        uses: EmbarkStudios/cargo-deny-action@e2f4ede4a4e60ea15ff31bc0647485d80c66cfba # v2.0.4
        with:
          manifest-path: packages/ui/src-tauri/Cargo.toml
          # `all` = check advisories, bans, licenses, sources.
          command: check all
          arg: --hide-inclusion-graph

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      # PR comments + status check from gitleaks.
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks can diff against base.
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        # Free for public repos; org/private repos require GITLEAKS_LICENSE secret.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
