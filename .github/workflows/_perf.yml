name: Performance Benchmarks

# Triggers (spec §4.3, design D-W/D-AB):
#   - push to main: writes the per-OS baseline artifact subsequent PRs diff against.
#   - schedule: '0 4 * * 1-6' (Mon–Sat, Linux only via cost-fallback gate);
#               '0 4 * * 0'   (Sunday, full three-OS coverage).
#   - pull_request: run only when labels include `perf` (auto-applied by labeler.yml
#     on changes under packages/gateway/src/{engine,db,embedding,connectors,llm,voice,perf}/**).
#
# Cost-fallback gate (spec §4.3): macOS+Windows skip the heavy bench/upload/
# compare steps on Mon–Sat nightlies; cheap setup steps (Harden Runner,
# Checkout, Setup Bun, install) run unconditionally. Net: ~95% per-non-Linux-OS
# minutes saved on weekday nights. Push-to-main and perf-PRs always run all
# three OSes, so artifacts on `main` are kept fresh on every merge.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  schedule:
    - cron: "0 4 * * 1-6"   # Mon–Sat 04:00 UTC — Linux only (cost-fallback gate, D-W/D-AB)
    - cron: "0 4 * * 0"     # Sunday 04:00 UTC — full three-OS coverage

# Note: per-job permissions and concurrency are used (not workflow-level)
# per SonarQube `githubactions:S8264` / `S8233` (least-privilege at the
# narrowest scope) and because workflow-level `concurrency` cannot read
# `matrix.*` — it would degrade to one shared group across all OSes and
# serialise the matrix.
#
# A workflow-level `permissions: {}` baseline is still set so any job
# that omits its own permissions block inherits no token scopes (Scorecard
# `Token-Permissions` requires a top-level declaration). Each job below
# explicitly grants only the scopes it actually uses.
permissions: {}

jobs:
  detect-trigger:
    name: Decide whether to run the bench matrix
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - id: gate
        run: |
          set -euo pipefail
          case "${GITHUB_EVENT_NAME}" in
            push|schedule)
              echo "run=true" >> "$GITHUB_OUTPUT"
              ;;
            pull_request)
              # Only run when the `perf` label is on the PR.
              labels="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
              if echo "$labels" | tr ' ' '\n' | grep -Fxq "perf"; then
                echo "run=true" >> "$GITHUB_OUTPUT"
              else
                echo "run=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "run=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  benchmark:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.run == 'true'
    name: Bench (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write   # for `gh pr comment` upsert in bench-ci.ts
      actions: read          # for `gh run list` + `gh run view` + `gh run download`
    # Spec § 4.3 — do not skew measurements by cancelling a running matrix.
    # Group by (workflow, os, ref) so different branches don't queue behind
    # each other but two pushes on the same branch+OS serialise.
    # Note: on Mon–Sat nightlies, macOS/Windows provision-then-skip (~2 min)
    # before releasing their concurrency slot. A same-branch push arriving
    # during that window queues briefly; accepted trade-off per D-W.
    concurrency:
      group: bench-${{ github.workflow }}-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      # The S1 / S4 / S6-* / S7-a / S7-b drivers spawn `bun packages/gateway/
      # src/index.ts`. Gateway init calls `createPlatformServices()`, which on
      # Linux requires `secret-tool` (libsecret-tools) and on macOS needs an
      # unlocked Keychain. Without these the gateway exits 1 before printing
      # `[gateway] ready`, and every spawn-based surface fails fast. Steps
      # mirror `_test-suite.yml` (lines 54-72) — keep in sync.
      - name: Linux — libsecret + D-Bus (gateway vault init)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libsecret-tools gnome-keyring dbus

      # macOS GHA marks downloaded native libs with `com.apple.quarantine`,
      # which blocks dlopen() of `sqlite-vec.dylib` from the bun:sqlite Workers
      # spawned by the S10 driver and exits the bench with code 139 (SIGSEGV).
      # Strip it pre-bench. Mirrors `_test-suite.yml:59-62`.
      - name: macOS — Strip quarantine from native SQLite extensions
        if: runner.os == 'macOS'
        shell: bash
        run: find node_modules -name "*.dylib" -print0 2>/dev/null | xargs -0 xattr -d com.apple.quarantine 2>/dev/null || true

      - name: macOS — Create and unlock CI Keychain (gateway vault init)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          security create-keychain -p "" nimbus-ci.keychain
          security list-keychains -d user -s nimbus-ci.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s nimbus-ci.keychain
          security unlock-keychain -p "" nimbus-ci.keychain
          security set-keychain-settings -lut 7200 nimbus-ci.keychain

      # Derive runner_id once. bench-ci.ts and the artifact upload BOTH
      # consume this id verbatim — earlier versions had divergent forms
      # (matrix OS for upload, normalised id for lookup) and the artifact
      # name silently never matched. Keep the two sides aligned.
      - name: Derive runner id
        id: runner-id
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}" in
            Linux)   runner_id="gha-ubuntu" ;;
            macOS)   runner_id="gha-macos" ;;
            Windows) runner_id="gha-windows" ;;
            *)       runner_id="gha-${RUNNER_OS,,}" ;;
          esac
          echo "id=${runner_id}" >> "$GITHUB_OUTPUT"

      - name: Run bench
        if: |
          matrix.os == 'ubuntu-24.04' ||
          github.event_name != 'schedule' ||
          github.event.schedule == '0 4 * * 0'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/perf-fixtures"
          bun packages/gateway/src/perf/bench-runner.ts \
            --all --gha --runs 5 --corpus small \
            --history "${RUNNER_TEMP}/run-history.jsonl" \
            --fixture-cache "${RUNNER_TEMP}/perf-fixtures"

      - name: Upload run history artifact
        if: |
          matrix.os == 'ubuntu-24.04' ||
          github.event_name != 'schedule' ||
          github.event.schedule == '0 4 * * 0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # MUST match the format `perf-${runner_id}-${sha}` that
          # bench-ci.ts constructs for `gh run download --name ...`.
          name: perf-${{ steps.runner-id.outputs.id }}-${{ github.sha }}
          path: ${{ runner.temp }}/run-history.jsonl
          retention-days: 90

      - name: Compare + post PR-comment delta
        if: |
          matrix.os == 'ubuntu-24.04' ||
          github.event_name != 'schedule' ||
          github.event.schedule == '0 4 * * 0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bun packages/gateway/src/perf/bench-ci.ts \
            --current "${RUNNER_TEMP}/run-history.jsonl" \
            --runner "${{ steps.runner-id.outputs.id }}"
