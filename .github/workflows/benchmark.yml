name: Performance Benchmarks
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    # Default GITHUB_TOKEN needs write to push gh-pages; optional BENCHMARK_PUSH_TOKEN uses PAT instead.
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.BENCHMARK_PUSH_TOKEN || github.token }}

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "chore: initialise gh-pages branch for benchmark history"
            git push origin gh-pages
            git checkout -
          fi

      - name: Run benchmarks
        run: bun run scripts/capture-benchmarks.ts > benchmark-result.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1.22.0
        with:
          name: Nimbus Engine Benchmarks
          tool: "customSmallerIsBetter"
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.BENCHMARK_PUSH_TOKEN || github.token }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
