name: Performance Benchmarks
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Default GITHUB_TOKEN needs write to push gh-pages; optional BENCHMARK_PUSH_TOKEN uses PAT instead.
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      # Use the default job token for clone — do not pass BENCHMARK_PUSH_TOKEN here; a PAT scoped
      # to another repo or missing repo scope yields a tree without `.github/actions/*` and breaks
      # the composite action below.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-nimbus-ci

      - name: Ensure gh-pages branch exists
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "chore: initialise gh-pages branch for benchmark history"
            git push origin gh-pages
            # `checkout -` is unreliable after `--orphan`; return to the branch that triggered this workflow.
            git checkout "${GITHUB_REF_NAME}"
          fi

      - name: Run benchmarks
        run: bun run scripts/capture-benchmarks.ts > benchmark-result.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1.22.0
        with:
          name: Nimbus Engine Benchmarks
          tool: "customSmallerIsBetter"
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.BENCHMARK_PUSH_TOKEN || github.token }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
